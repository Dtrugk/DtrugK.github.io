<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
<meta charset="utf-8">
<title>{{ site.title | escape }}</title>
<link rel="canonical" href="{{ page.redirect_to | absolute_url }}">
<meta http-equiv="refresh" content="0; url={{ page.redirect_to | relative_url }}">
<meta name="robots" content="noindex">
<script>location.replace({{ page.redirect_to | relative_url | jsonify }});</script>
</head>
<body>
<p>Redirecting to <a href="{{ page.redirect_to | relative_url }}">{{ page.redirect_to }}</a>…</p>
</body>
</html>
